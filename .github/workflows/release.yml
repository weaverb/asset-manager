name: Release

on:
  push:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Install Linux dependencies (Tauri / WebKit)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: npm

      - run: npm ci

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy
          rustflags: ""
          rust-src-dir: src-tauri

      - name: Install cargo-llvm-cov
        run: |
          rustup component add llvm-tools-preview --toolchain stable
          cargo install cargo-llvm-cov --locked

      - run: npm run build
      - run: npm run test:rust
      - run: npm run fmt:rust:check
      - run: npm run lint:rust
      - run: npm run test:rust:coverage

  release-please:
    runs-on: ubuntu-latest
    needs: quality
    permissions:
      contents: write
      pull-requests: write
    outputs:
      releases_created: ${{ steps.rp.outputs.releases_created }}
      tag_name: ${{ steps.rp.outputs['src-tauri--tag_name'] }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: rp
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.releases_created == 'true' }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            rust_target: aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            rust_target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ""
            rust_target: ""
          - platform: ubuntu-22.04-arm
            args: ""
            rust_target: ""
          - platform: windows-latest
            args: ""
            rust_target: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04' || matrix.platform == 'ubuntu-22.04-arm'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: npm

      - run: npm ci

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.rust_target }}
          rustflags: ""
          rust-src-dir: src-tauri

      - name: Import Apple Developer certificate
        if: matrix.platform == 'macos-latest'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${APPLE_CERTIFICATE:-}" ]; then
            echo "Skipping Apple certificate import (APPLE_CERTIFICATE secret not set)."
            exit 0
          fi
          if [ -z "${KEYCHAIN_PASSWORD:-}" ] || [ -z "${APPLE_CERTIFICATE_PASSWORD:-}" ]; then
            echo "APPLE_CERTIFICATE is set but KEYCHAIN_PASSWORD or APPLE_CERTIFICATE_PASSWORD is missing."
            exit 1
          fi
          node -e "require('fs').writeFileSync('certificate.p12', Buffer.from(process.env.APPLE_CERTIFICATE, 'base64'))"
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          python3 <<'PY'
          import os
          import re
          import subprocess

          out = subprocess.check_output(
              ["security", "find-identity", "-v", "-p", "codesigning", "build.keychain"],
              text=True,
          )
          ident = None
          for line in out.splitlines():
              m = re.search(r'"([^"]*Developer ID Application[^"]*)"', line)
              if m:
                  ident = m.group(1)
                  break
          if not ident:
              print(out)
              raise SystemExit("No Developer ID Application identity found in build.keychain")
          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as f:
              f.write("APPLE_SIGNING_IDENTITY<<EOF\n")
              f.write(ident + "\n")
              f.write("EOF\n")
          PY

      - name: Write App Store Connect API key for notarization
        if: matrix.platform == 'macos-latest'
        env:
          APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
        run: |
          set -euo pipefail
          if [ -z "${APPLE_API_KEY_P8_BASE64:-}" ]; then
            echo "Skipping App Store Connect API key (APPLE_API_KEY_P8_BASE64 secret not set)."
            exit 0
          fi
          node -e "require('fs').writeFileSync('AuthKey.p8', Buffer.from(process.env.APPLE_API_KEY_P8_BASE64, 'base64'))"
          echo "APPLE_API_KEY_PATH=$PWD/AuthKey.p8" >> "$GITHUB_ENV"

      - name: Import Windows code signing certificate
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          $ErrorActionPreference = "Stop"
          if ([string]::IsNullOrEmpty($env:WINDOWS_CERTIFICATE)) {
            Write-Host "Skipping Windows certificate import (WINDOWS_CERTIFICATE secret not set)."
            exit 0
          }
          if ([string]::IsNullOrEmpty($env:WINDOWS_CERTIFICATE_PASSWORD)) {
            Write-Error "WINDOWS_CERTIFICATE is set but WINDOWS_CERTIFICATE_PASSWORD is missing."
            exit 1
          }
          New-Item -ItemType Directory -Path certificate -Force | Out-Null
          Set-Content -Path certificate/tempCert.txt -Value $env:WINDOWS_CERTIFICATE
          certutil -decode certificate/tempCert.txt certificate/certificate.pfx
          Remove-Item certificate/tempCert.txt
          $secure = ConvertTo-SecureString -String $env:WINDOWS_CERTIFICATE_PASSWORD -Force -AsPlainText
          $imported = Import-PfxCertificate -FilePath certificate/certificate.pfx -CertStoreLocation Cert:\CurrentUser\My -Password $secure
          "WINDOWS_CERT_THUMBPRINT=$($imported.Thumbprint)" >> $env:GITHUB_ENV

      - name: Apply Windows code signing to Tauri bundle config
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          if ([string]::IsNullOrEmpty($env:WINDOWS_CERT_THUMBPRINT)) {
            Write-Host "Skipping Tauri Windows signing config (no certificate was imported in this job)."
            exit 0
          }
          node -e 'const fs=require("fs");const p="src-tauri/tauri.conf.json";const j=JSON.parse(fs.readFileSync(p,"utf8"));j.bundle=j.bundle||{};const w=j.bundle.windows||{};j.bundle.windows=Object.assign({},w,{certificateThumbprint:process.env.WINDOWS_CERT_THUMBPRINT,digestAlgorithm:"sha256",timestampUrl:"http://timestamp.digicert.com"});fs.writeFileSync(p,JSON.stringify(j,null,2)+"\n");'

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ env.APPLE_API_KEY_PATH }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
        with:
          tagName: ${{ needs.release-please.outputs.tag_name }}
          releaseDraft: false
          includeUpdaterJson: false
          args: ${{ matrix.args }}
